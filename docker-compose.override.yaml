services:
  backend:
    env_file:
      - ./.env
    build:
      context: .
      dockerfile: ./backend/Dockerfile
      target: dev
    volumes:
      - ./backend:/app/backend
    environment:
      - ENV=development
      - PYTHONUNBUFFERED=1

    command: >
      sh -c "make dev-run"
    ports:
      - "8000:8000"

  web:
    container_name: web
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    working_dir: /app
    command: npm run dev:web
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api/v1
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - web_node_modules:/app/node_modules
      - web_app_node_modules:/app/apps/web/node_modules
      - web_mobile_node_modules:/app/apps/mobile/node_modules
      - web_shared_node_modules:/app/packages/shared/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  web_node_modules:
  web_app_node_modules:
  web_mobile_node_modules:
  web_shared_node_modules:
